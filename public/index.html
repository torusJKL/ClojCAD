<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CAD REPL PoC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; overflow: hidden; }
    #viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    #ui { position: fixed; top: 0; left: 0; z-index: 10; padding: 6px; }
    .layer-panel { background: rgba(20,20,30,0.85); color: #bbb; padding: 8px 10px; border-radius: 4px; font-size: 13px; min-width: 160px; user-select: none; }
    .layer-panel h3 { margin: 0 0 6px 0; font-size: 14px; color: #eee; }
    .layer-panel .loading { color: #888; font-size: 12px; margin-bottom: 6px; }
    .layer-panel .error { color: #e55; font-size: 12px; margin-bottom: 6px; }
    .layer-entry { margin: 3px 0; }
    .layer-entry label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .sub-layers { margin: 2px 0 2px 16px; }
    .sub-toggle { background: none; border: none; color: #888; cursor: pointer; padding: 0; margin-right: 2px; font-size: 10px; line-height: 1; }
    .sub-entry { margin: 1px 0 1px 10px; }
    input[type="checkbox"] { margin: 0; cursor: pointer; }
  </style>
</head>
<body>
  <div id="viewport"></div>
  <div id="ui"></div>
  <script src="/js/main.js"></script>
</body>
</html>
